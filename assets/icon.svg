<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Aqua Launcher Logo</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A stylized water drop with aurora/neon teal and purple glow effects, representing the Aqua Launcher app</desc>
<defs>
  <radialGradient id="bgGlow" cx="50%" cy="55%" r="45%">
    <stop offset="0%" stop-color="#1a1a2e"/>
    <stop offset="100%" stop-color="#0a0a14"/>
  </radialGradient>
  <radialGradient id="dropFill" cx="38%" cy="35%" r="60%">
    <stop offset="0%" stop-color="#5fe3ff" stop-opacity="0.9"/>
    <stop offset="40%" stop-color="#2299cc" stop-opacity="0.85"/>
    <stop offset="100%" stop-color="#0d4a7a" stop-opacity="0.95"/>
  </radialGradient>
  <radialGradient id="innerGlow" cx="38%" cy="32%" r="50%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
    <stop offset="60%" stop-color="#a0f0ff" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#5fe3ff" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="auroraCore" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#7b4fff" stop-opacity="0.7"/>
    <stop offset="50%" stop-color="#3b1fa0" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#1a0a50" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="rimLight" cx="70%" cy="70%" r="50%">
    <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
  </radialGradient>
  <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="12"/>
  </filter>
  <filter id="glowFilter" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="18" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="tinyGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="6"/>
  </filter>
  <clipPath id="dropClip">
    <path d="M340 130 C340 130 190 310 190 400 C190 482 258 550 340 550 C422 550 490 482 490 400 C490 310 340 130 340 130 Z"/>
  </clipPath>
</defs>


<circle cx="340" cy="355" r="265" fill="url(#bgGlow)" style="stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>


